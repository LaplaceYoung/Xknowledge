name: Extension CI

on:
  push:
    branches:
      - main
    paths:
      - x-knowledge-extension/**
      - .github/workflows/extension-ci.yml
  pull_request:
    paths:
      - x-knowledge-extension/**
      - .github/workflows/extension-ci.yml

jobs:
  lint_build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: x-knowledge-extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: x-knowledge-extension/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
