name: Deploy Marketing Pages

on:
  push:
    branches:
      - main
    paths:
      - marketing/**
      - .github/workflows/deploy-marketing-pages.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Pages Availability
        id: pages_mode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          if [ "$status" = "200" ]; then
            build_type=$(python3 - <<'PY'
import json
with open('/tmp/pages.json', 'r', encoding='utf-8') as f:
    data = json.load(f)
print((data.get('build_type') or '').strip())
PY
)
            if [ "$build_type" = "workflow" ]; then
              echo "enabled=true" >> "$GITHUB_OUTPUT"
              echo "GitHub Pages is in workflow mode. Using Actions deploy."
            else
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "GitHub Pages is enabled but build_type=${build_type:-unknown}. Using gh-pages fallback."
            fi
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages API returned ${status}. Falling back to gh-pages branch deploy."
          fi

      - name: Setup Pages
        if: steps.pages_mode.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        if: steps.pages_mode.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: marketing

      - name: Deploy to GitHub Pages
        if: steps.pages_mode.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deploy to gh-pages Branch (Fallback)
        if: steps.pages_mode.outputs.enabled != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ./marketing
          publish_branch: gh-pages
          force_orphan: true

      - name: Deployment Notes
        if: always()
        run: |
          if [ "${{ steps.pages_mode.outputs.enabled }}" = "true" ]; then
            echo "Marketing site deployed via GitHub Pages Actions."
          else
            echo "Fallback deployed to gh-pages branch."
            echo "Enable Pages in Settings -> Pages -> Deploy from a branch (gh-pages / root)."
          fi
